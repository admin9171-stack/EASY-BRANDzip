openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Easy-Brand e-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Shopping cart operations
  - name: wishlist
    description: Wishlist operations
  - name: orders
    description: Order operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: onSale
          in: query
          schema:
            type: boolean
        - name: bestSelling
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current session cart
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add an item to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart/items/{productId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update quantity of a cart item
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove an item from the cart
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/clear:
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear all items from the cart
      responses:
        "200":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get current session wishlist
      responses:
        "200":
          description: Wishlist contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"

  /wishlist/items:
    post:
      operationId: addWishlistItem
      tags: [wishlist]
      summary: Add a product to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistItemInput"
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"

  /wishlist/items/{productId}:
    delete:
      operationId: removeWishlistItem
      tags: [wishlist]
      summary: Remove a product from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"

  /orders:
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderNumber}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: ["number", "null"]
        image:
          type: string
        category:
          type: string
        inStock:
          type: boolean
        isFeatured:
          type: boolean
        isOnSale:
          type: boolean
        isBestSelling:
          type: boolean
        badge:
          type: ["string", "null"]
      required:
        - id
        - name
        - description
        - price
        - originalPrice
        - image
        - category
        - inStock
        - isFeatured
        - isOnSale
        - isBestSelling
        - badge

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
      required:
        - id
        - name
        - slug

    CartItem:
      type: object
      properties:
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
        lineTotal:
          type: number
      required:
        - productId
        - product
        - quantity
        - lineTotal

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        total:
          type: number
        itemCount:
          type: integer
      required:
        - items
        - subtotal
        - total
        - itemCount

    CartItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    CartItemUpdate:
      type: object
      properties:
        quantity:
          type: integer
      required:
        - quantity

    WishlistItem:
      type: object
      properties:
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
      required:
        - productId
        - product

    Wishlist:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WishlistItem"
        itemCount:
          type: integer
      required:
        - items
        - itemCount

    WishlistItemInput:
      type: object
      properties:
        productId:
          type: integer
      required:
        - productId

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
        lineTotal:
          type: number
      required:
        - productId
        - productName
        - quantity
        - price
        - lineTotal

    BillingAddress:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: ["string", "null"]
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        country:
          type: string
        phone:
          type: string
      required:
        - firstName
        - lastName
        - company
        - address
        - city
        - state
        - zipCode
        - country
        - phone

    OrderInput:
      type: object
      properties:
        email:
          type: string
        billingAddress:
          $ref: "#/components/schemas/BillingAddress"
        paymentMethod:
          type: string
          enum: [bank_transfer, check, cash_on_delivery]
        note:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemInput"
      required:
        - email
        - billingAddress
        - paymentMethod
        - note
        - items

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: integer
        date:
          type: string
        email:
          type: string
        total:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
        note:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        billingAddress:
          $ref: "#/components/schemas/BillingAddress"
      required:
        - id
        - orderNumber
        - date
        - email
        - total
        - paymentMethod
        - status
        - note
        - items
        - billingAddress
